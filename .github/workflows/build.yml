name: Build Theos Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: 📦 1. 检出你的插件代码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 🛠️ 2. 部署 Theos 核心环境
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: 🍎 3. 部署 iOS SDKs
        uses: actions/checkout@v4
        with:
          repository: theos/sdks
          path: theos/sdks

      - name: ⚙️ 4. 安装签名依赖 (ldid)
        run: brew install ldid

      - name: 🚀 5. 编译 DEB 插件包
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1

      - name: 📥 6. 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Release-DEB
          path: packages/*.deb
